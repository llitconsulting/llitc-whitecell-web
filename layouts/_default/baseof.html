<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">

  <link rel="icon" type="image/png" href="/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'wc-blue':  '#327BB0',
            'wc-light': '#AFD6F2',
          },
          fontFamily: {
            'bauhaus': ['Jost', 'sans-serif'],
            'apparat': ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    body { @apply font-apparat text-gray-800 antialiased; }
    h1, h2, h3, h4, h5, h6 { @apply font-bauhaus; }
  </style>
</head>
<body class="bg-white">

  {{ block "header" . }}{{ end }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ block "footer" . }}{{ end }}

</body>
</html>
